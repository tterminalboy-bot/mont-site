<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Borne QR Kiosk Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f111a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #00adb5;
            text-align: center;
        }
        .card {
            background-color: #1a1c24;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2d3d;
            width: 100%;
        }
        
        /* --- ÉCRAN PARAMÉTRAGE --- */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: #0f111a;
            border: 1px solid #3a3d52;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input[type="number"]:focus {
            border-color: #00adb5;
        }
        .switch-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0f111a;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #2a2d3d;
            width: 100%;
        }
        .switch-label {
            font-size: 0.95rem;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3d52;
            transition: .2s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #00adb5; }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-primary {
            width: 100%;
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0, 173, 181, 0.3);
        }

        /* --- ÉCRAN SCAN VERROUILLÉ (CENTRAGE PARFAIT) --- */
        #scan-screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .camera-box-wrapper {
            width: 290px;
            height: 290px;
            background-color: #0f111a;
            border-radius: 24px;
            overflow: hidden;
            border: 4px solid #00adb5;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }
        #reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
        .status-badge {
            display: inline-block;
            background-color: rgba(0, 173, 181, 0.1);
            color: #00adb5;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* --- PAGE EN OVERLAY PLEIN ÉCRAN TOTAL --- */
        #result-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0f111a;
            z-index: 99999;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }
        .overlay-body {
            width: 100%;
            height: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .scanned-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }
        .scanned-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .fallback-text-box {
            padding: 40px;
            text-align: center;
            color: white;
        }
        
        /* Bannière du compte à rebours flottante */
        .countdown-banner {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            border-top: 1px solid #2a2d3d;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="setup-screen" class="card">
            <h1>Configuration Borne</h1>
            
            <div class="form-group">
                <label for="input-duration">Durée d'affichage avant retour au scan (secondes)</label>
                <input type="number" id="input-duration" min="2" max="60" value="5">
            </div>

            <div class="switch-group">
                <span class="switch-label">🖥️ Lancer en mode Plein Écran</span>
                <label class="switch">
                    <input type="checkbox" id="switch-fullscreen" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switch-group">
                <span class="switch-label">🔊 Émettre un bip au scan</span>
                <label class="switch">
                    <input type="checkbox" id="switch-sound" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="switch-group">
                <span class="switch-label">📳 Vibrer au scan</span>
                <label class="switch">
                    <input type="checkbox" id="switch-vibrate" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <button type="button" class="btn-primary" onclick="confirmerEtLancer()">🚀 Enregistrer et lancer la borne</button>
        </div>

        <div id="scan-screen">
            <div class="status-badge">🔒 MODE BORNE PUBLIC — PRÊT À SCANNER</div>
            <div class="camera-box-wrapper">
                <div id="reader"></div>
            </div>
        </div>

    </div>

    <div id="result-screen">
        <div class="overlay-body" id="result-dynamic-content"></div>
        <div class="countdown-banner" id="countdown-label">Affichage...</div>
    </div>

    <script>
        let html5QrCode;
        let configBorne = { duration: 5, sound: true, vibrate: true, fullscreen: true };
        let timerRetour;

        function echapperHTML(str) {
            return str.replace(/[&<>"']/g, match => {
                const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
                return map[match];
            });
        }

        function forcerPleinEcran() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Erreur d'activation du plein écran: ${err.message}`);
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('borne_config')) {
                try {
                    configBorne = JSON.parse(localStorage.getItem('borne_config'));
                    document.getElementById('input-duration').value = configBorne.duration;
                    document.getElementById('switch-sound').checked = configBorne.sound;
                    document.getElementById('switch-vibrate').checked = configBorne.vibrate;
                    document.getElementById('switch-fullscreen').checked = configBorne.fullscreen !== false;
                } catch(e) { console.error(e); }
            }
        });

        function declencherBip() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch(e) { console.warn(e); }
        }

        function declencherVibration() {
            if (navigator.vibrate) navigator.vibrate(250);
        }

        function confirmerEtLancer() {
            const confirmation = confirm("Lancer la borne ? Les réglages seront verrouillés.");
            if (!confirmation) return;

            // CONFIGURATION ENREGISTRÉE
            configBorne.duration = parseInt(document.getElementById('input-duration').value, 10) || 5;
            configBorne.sound = document.getElementById('switch-sound').checked;
            configBorne.vibrate = document.getElementById('switch-vibrate').checked;
            configBorne.fullscreen = document.getElementById('switch-fullscreen').checked;

            localStorage.setItem('borne_config', JSON.stringify(configBorne));

            // EXÉCUTION DU PLEIN ÉCRAN APRÈS LE CONFIRM (Plus de perturbation du message)
            if (configBorne.fullscreen) {
                forcerPleinEcran();
            }

            document.getElementById('setup-screen').style.display = 'none';
            // Utilisation de 'flex' pour appliquer le centrage CSS parfait de la caméra
            document.getElementById('scan-screen').style.display = 'flex';

            lancerLeScanner();
        }

        function lancerLeScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const configScan = { fps: 20, qrbox: { width: 220, height: 220 } };

            html5QrCode.start({ facingMode: "environment" }, configScan, onScanSuccess)
            .catch(err => {
                html5QrCode.start({ facingMode: "user" }, configScan, onScanSuccess)
                .catch(e => console.warn(e));
            });
        }

        function onScanSuccess(decodedText) {
            if (configBorne.sound) declencherBip();
            if (configBorne.vibrate) declencherVibration();

            html5QrCode.stop().then(() => {
                genererPageParDessus(decodedText);
            }).catch(err => console.error(err));
        }

        function genererPageParDessus(brutContent) {
            const resultScreen = document.getElementById('result-screen');
            const targetContainer = document.getElementById('result-dynamic-content');
            
            targetContainer.innerHTML = ''; 
            resultScreen.style.display = 'flex'; 

            let cleanContent = brutContent.trim();
            const estUrl = /^(http|https):\/\/[^ "]+$/i.test(cleanContent);
            const estDangereux = /^(javascript:|data:|vbscript:)/i.test(cleanContent);

            if (estDangereux) {
                targetContainer.innerHTML = `<div class="fallback-text-box"><h2>Contenu Bloqué</h2><p>Action non autorisée.</p></div>`;
                lancerCompteALebours();
                return;
            }

            if (estUrl) {
                // RECONSTRUCTION ET CORRECTION LIENS GOOGLE DRIVE (Aperçu Iframe Intégrable Canonique)
                if (cleanContent.includes("drive.google.com")) {
                    let fileId = "";
                    
                    if (cleanContent.includes("/d/")) {
                        fileId = cleanContent.split('/d/')[1].split('/')[0];
                    } else if (cleanContent.includes("id=")) {
                        fileId = cleanContent.split('id=')[1].split('&')[0];
                    }
                    
                    if (fileId) {
                        cleanContent = `https://docs.google.com/file/d/${fileId}/preview`;
                    }
                    targetContainer.innerHTML = `<iframe class="scanned-iframe" src="${cleanContent}" allow="autoplay"></iframe>`;
                }
                // Traitement YouTube
                else if (cleanContent.includes("youtube.com/watch") || cleanContent.includes("youtu.be")) {
                    let videoId = "";
                    if (cleanContent.includes("v=")) {
                        videoId = cleanContent.split("v=")[1].split("&")[0];
                    } else if (cleanContent.includes("youtu.be/")) {
                        videoId = cleanContent.split("youtu.be/")[1].split("?")[0];
                    }
                    if (videoId) {
                        cleanContent = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
                    }
                    targetContainer.innerHTML = `<iframe class="scanned-iframe" src="${cleanContent}" allow="autoplay; encrypted-media; fullscreen"></iframe>`;
                } else {
                    const estImageDirecte = /\.(jpeg|jpg|gif|png|webp|svg)$/i.test(cleanContent);
                    if (estImageDirecte) {
                        targetContainer.innerHTML = `<img class="scanned-image" src="${cleanContent}" alt="Image Borne">`;
                    } else {
                        targetContainer.innerHTML = `<iframe class="scanned-iframe" src="${cleanContent}" allow="autoplay; fullscreen"></iframe>`;
                    }
                }
            } else {
                targetContainer.innerHTML = `
                    <div class="fallback-text-box">
                        <h2>Donnée détectée :</h2>
                        <p style="font-size: 1.5rem; color: #00adb5; word-break: break-word;">${echapperHTML(cleanContent)}</p>
                    </div>`;
            }

            lancerCompteALebours();
        }

        function lancerCompteALebours() {
            let tempsRestant = configBorne.duration;
            const label = document.getElementById('countdown-label');
            label.innerText = `⏱️ Fermeture de la page et retour au scan dans ${tempsRestant}s...`;
            
            clearInterval(timerRetour);
            timerRetour = setInterval(() => {
                tempsRestant--;
                if (tempsRestant <= 0) {
                    clearInterval(timerRetour);
                    fermerPageOverlay();
                } else {
                    label.innerText = `⏱️ Fermeture de la page et retour au scan dans ${tempsRestant}s...`;
                }
            }, 1000);
        }

        function fermerPageOverlay() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('result-dynamic-content').innerHTML = ''; 
            lancerLeScanner();
        }
    </script>

</body>
</html>
